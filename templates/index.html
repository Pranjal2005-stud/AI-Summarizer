<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Document Summarizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F0F7FF;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      display: flex;
      align-items: center;
      padding: 1.25rem 3rem;
      width: 100%;
      min-height: 75px;
      /* Curved line aesthetic */
      background: #ffffff;
      border-bottom: 2px solid #BBDEFB;
      border-radius: 0 0 50% 50% / 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(30, 136, 229, 0.04);
    }
    
    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .logo-img {
      height: 40px;
      width: auto;
      object-fit: contain;
      /* Fallback text style if the user hasn't uploaded logo.png yet */
      font-family: 'Sora', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #1E88E5;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 3rem 0 2.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #EBF4FF;
      color: #1565C0;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 1.2rem;
      border: 1px solid #BBDEFB;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      background: #1E88E5;
      border-radius: 50%;
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #0D1B2A;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    h1 span { color: #1E88E5; }

    .hero-sub {
      color: #5a6b7c;
      font-size: 1rem;
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Upload card ── */
    .upload-card {
      background: #fff;
      border: 2px dashed #BBDEFB;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      margin-bottom: 1rem;
    }

    .upload-card:hover  { border-color: #1E88E5; background: #F5FAFF; }
    .upload-card.dragging { border-color: #1565C0; background: #E3F0FF; transform: scale(1.01); }

    .upload-icon {
      width: 56px;
      height: 56px;
      background: #EBF4FF;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .upload-icon svg { width: 26px; height: 26px; stroke: #1E88E5; }

    .upload-title {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #0D1B2A;
      margin-bottom: 0.35rem;
    }

    .upload-sub { font-size: 0.82rem; color: #7a8ea0; }
    .upload-sub strong { color: #1E88E5; cursor: pointer; }

    input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ── Format badges ── */
    .formats {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .fmt {
      background: #F0F7FF;
      border: 1px solid #BBDEFB;
      color: #1565C0;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 6px;
    }

    /* ── File pill ── */
    .file-pill {
      display: none;
      align-items: center;
      gap: 10px;
      background: #EBF4FF;
      border: 1px solid #BBDEFB;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 1.25rem;
    }

    .file-pill.show { display: flex; }

    .file-icon {
      width: 36px;
      height: 36px;
      background: #1E88E5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-icon svg { width: 17px; height: 17px; stroke: #fff; }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      color: #0D1B2A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size { font-size: 11px; color: #7a8ea0; margin-top: 2px; }

    .remove-btn {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a8ea0;
      border-radius: 6px;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .remove-btn:hover { background: #dde8f5; color: #1E88E5; }

    /* ── Main button ── */
    .btn-main {
      width: 100%;
      background: linear-gradient(135deg, #1E88E5, #1565C0);
      color: #fff;
      border: none;
      padding: 15px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(30, 136, 229, 0.35);
    }

    .btn-main:active  { transform: translateY(0); }
    .btn-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-main svg { width: 18px; height: 18px; stroke: #fff; }

    /* ── Loader ── */
    .loading-box {
      display: none;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e0eaf7;
      padding: 2rem;
      margin-top: 1.25rem;
      text-align: center;
    }

    .loading-box.show { display: block; }

    .loader-dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 1rem; }

    .dot {
      width: 9px;
      height: 9px;
      background: #1E88E5;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
      40%            { transform: scale(1);    opacity: 1; }
    }

    .load-text { color: #5a6b7c; font-size: 0.9rem; }

    /* ── Result box ── */
    .result-box {
      display: none;
      margin-top: 1.25rem;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e0eaf7;
      animation: fadeUp 0.4s ease;
    }

    .result-box.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      background: linear-gradient(135deg, #1E88E5, #1565C0);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-title {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .result-title svg { width: 16px; height: 16px; stroke: #fff; }

    .copy-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: rgba(255,255,255,0.3); }

    .result-body {
      background: #fff;
      padding: 1.5rem 1.25rem;
    }

    .summary-text {
      color: #1a2533;
      font-size: 0.95rem;
      line-height: 1.85;
    }

    /* ── Stats ── */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .stat {
      flex: 1;
      min-width: 90px;
      background: #F0F7FF;
      border-radius: 10px;
      padding: 12px 14px;
      text-align: center;
    }

    .stat-val {
      font-family: 'Sora', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #1E88E5;
    }

    .stat-label { font-size: 11px; color: #7a8ea0; margin-top: 3px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="#" class="nav-logo" title="Home (Disconnected)">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Company Logo" class="logo-img">
    </a>
  </nav>

<div class="wrap">

  <!-- Hero -->
  <div class="hero">
    <div class="badge">
      <span class="badge-dot"></span> AI-Powered
    </div>
    <h1>Summarize any <span>document</span><br>in seconds</h1>
    <p class="hero-sub">Upload PDFs, Word docs, or text files and get clear, concise summaries powered by AI.</p>
  </div>

  <!-- Upload card -->
  <div class="upload-card" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg">
    <div class="upload-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775
             5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z"/>
      </svg>
    </div>
    <p class="upload-title">Drop your file here</p>
    <p class="upload-sub">or <strong>browse to upload</strong></p>
  </div>

  <!-- Format badges -->
  <div class="formats">
    <span class="fmt">PDF</span>
    <span class="fmt">DOCX</span>
    <span class="fmt">TXT</span>
    <span class="fmt">Up to 25 MB</span>
  </div>

  <!-- File pill -->
  <div class="file-pill" id="filePill">
    <div class="file-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5
             A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25
             m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125
             h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
      </svg>
    </div>
    <div class="file-info">
      <div class="file-name" id="fileName">document.pdf</div>
      <div class="file-size" id="fileSize">—</div>
    </div>
    <button class="remove-btn" onclick="removeFile()" title="Remove">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Generate button -->
  <button class="btn-main" id="mainBtn" onclick="uploadFile()">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12
           l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0
           3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/>
    </svg>
    Generate Summary
  </button>

  <!-- Loader -->
  <div class="loading-box" id="loader">
    <div class="loader-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p class="load-text" id="loadText">Reading your document...</p>
  </div>

  <!-- Result -->
  <div class="result-box" id="result">
    <div class="result-header">
      <div class="result-title">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0
               2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0
               -1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5
               a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0
               0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05
               -1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875
               c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125
               h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125
               H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z"/>
        </svg>
        Summary
      </div>
      <button class="copy-btn" onclick="copySummary()">Copy</button>
    </div>
    <div class="result-body">
      <p class="summary-text" id="summaryText"></p>
      <div class="stats-row" id="statsRow"></div>
    </div>
  </div>

</div>

<script>
  const loadMessages = [
    "Reading your document...",
    "Analyzing key points...",
    "Generating summary...",
    "Almost done..."
  ];

  let loadIdx = 0, loadTimer = null, selectedFile = null;

  /* ── File input ── */
  document.getElementById('fileInput').addEventListener('change', function () {
    if (this.files[0]) setFile(this.files[0]);
  });

  /* ── Drag & drop ── */
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragging'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('dragging'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragging');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function setFile(f) {
    selectedFile = f;
    document.getElementById('fileName').textContent = f.name;
    document.getElementById('fileSize').textContent = (f.size / 1024 / 1024).toFixed(2) + ' MB';
    document.getElementById('filePill').classList.add('show');
    document.getElementById('result').classList.remove('show');
  }

  function removeFile() {
    selectedFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('filePill').classList.remove('show');
    document.getElementById('result').classList.remove('show');
  }

  /* ── Upload & summarize ── */
  async function uploadFile() {
    if (!selectedFile) { alert("Please choose a file first."); return; }

    const btn = document.getElementById('mainBtn');
    btn.disabled = true;
    document.getElementById('loader').classList.add('show');
    document.getElementById('result').classList.remove('show');

    loadIdx = 0;
    document.getElementById('loadText').textContent = loadMessages[0];
    loadTimer = setInterval(() => {
      loadIdx = (loadIdx + 1) % loadMessages.length;
      document.getElementById('loadText').textContent = loadMessages[loadIdx];
    }, 2200);

    const formData = new FormData();
    formData.append("file", selectedFile);  

    console.log("Selected File:", selectedFile);
    console.log("FormData File:", formData.get("file"));

   try {

  const response = await fetch("/summarize", {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  if (!response.ok) {
    showResult(data.error || "Server error while processing file.");
    return;
  }

  showResult(data.summary);

} catch (e) {
  showResult("Network error. Server not reachable.");
}

    clearInterval(loadTimer);
    document.getElementById('loader').classList.remove('show');
    btn.disabled = false;
  }

  function showResult(text) {
    document.getElementById('summaryText').textContent = text;

    const words    = text.split(/\s+/).filter(Boolean).length;
    const readTime = Math.max(1, Math.round(words / 200));

    document.getElementById('statsRow').innerHTML = `
      <div class="stat">
        <div class="stat-val">${words}</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat">
        <div class="stat-val">${readTime} min</div>
        <div class="stat-label">Read time</div>
      </div>
      <div class="stat">
        <div class="stat-val">AI</div>
        <div class="stat-label">Generated</div>
      </div>
    `;

    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copySummary() {
    const text = document.getElementById('summaryText').textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1800);
    });
  }
</script>

</body>
</html>
